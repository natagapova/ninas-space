<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>meditations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="pixel-stars"></div>
  <header class="site-header">
  <nav class="nav">
    <a class="logo" href="index.html" data-i18n="logo">nina's space</a>
    <div class="nav-links">
      <a href="index.html"  data-i18n="navHome">home</a>
      <a href="meditations.html" class="active" data-i18n="navMeditations">meditations</a>
      <a href="affirmations.html"  data-i18n="navAffirmations">affirmations</a>
      <a href="games.html"  data-i18n="navGames">games</a>
    </div>
    <div class="lang-wrap">
      <label for="langSelect" data-i18n="langLabel">language</label>
      <select id="langSelect" aria-label="language switcher">
        <option value="en">english</option>
        <option value="sr">srpski</option>
      </select>
      <label for="soundSelect" data-i18n="soundLabel">sound</label>
      <select id="soundSelect" class="sound-select" aria-label="ambient type">
        <option value="ambient" data-i18n="soundAmbient">ambient</option>
        <option value="rain" data-i18n="soundRain">rain sounds</option>
        <option value="fire" data-i18n="soundFire">fire sounds</option>
        <option value="wind" data-i18n="soundWind">wind sounds</option>
        <option value="trees" data-i18n="soundTrees">trees sounds</option>
        <option value="lofi" data-i18n="soundLofi">lo-fi music</option>
      </select>
      <button id="audioToggle" class="audio-btn" type="button" data-i18n="audioToggleOff">ambient off</button>
    </div>
  </nav>
</header>
  <main>
    <section class="hero">
      <h1 data-i18n="medTitle">meditations</h1>
      <p data-i18n="medSubtitle">tap play to watch inside this page.</p>
      <div class="kitty-strip" aria-hidden="true">
        <img src="assets/pixel-kitty-1.svg" alt="pixel kitty bow">
        <img src="assets/pixel-kitty-2.svg" alt="pixel kitty friend">
      </div>
    </section>
    <section class="breathing-widget hero">
      <h2 data-i18n="breathTitle">breathing widget</h2>
      <p data-i18n="breathText">follow the bubble and breathe slowly.</p>
      <div class="breath-visual" id="breathBubble"></div>
      <div class="breath-meta">
        <p id="breathPhase" data-i18n="breathReady">ready</p>
        <p id="breathCount"></p>
      </div>
      <button class="tiny-btn" id="breathToggle" type="button" data-i18n="breathStart">start breathing</button>
    </section>
    <section id="meditationCards" class="cards"></section>
  </main>
  <footer class="footer" data-i18n="footer">made with love and pink pixels.</footer>
  <script src="app.js"></script>
</body>
</html>
